<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Happy Birthday Reah 🎂</title>

  <!-- FONT -->

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins', sans-serif;
      overflow:hidden;
      background:black;
      color:white;
    }

    .page{

      width:100%;
      height:100vh;

      display:none;

      flex-direction:column;
      justify-content:center;
      align-items:center;

      text-align:center;

      padding:30px;

      background-size:cover;
      background-position:center;

      animation:fade 1s ease;

      position:relative;

    }

    .active{
      display:flex;
    }

    .overlay{

      position:absolute;
      inset:0;

      background:rgba(0,0,0,0.45);

    }

    .content{
      position:relative;
      z-index:2;
    }

    h1{

      font-size:65px;
      margin-bottom:20px;

      text-shadow:0 0 20px rgba(255,255,255,0.25);

    }

    p{

      font-size:22px;
      line-height:1.8;

      max-width:700px;

      color:#f1f1f1;

    }

    button{

      margin-top:35px;

      padding:14px 34px;

      border:none;
      border-radius:40px;

      background:white;
      color:black;

      font-size:16px;
      font-weight:600;

      cursor:pointer;

      transition:0.3s;

    }

    button:hover{
      transform:scale(1.08);
    }

    img{

      width:300px;

      border-radius:25px;

      margin-top:25px;

      box-shadow:0 0 25px rgba(255,255,255,0.1);

    }

    @keyframes fade{

      from{
        opacity:0;
        transform:scale(1.03);
      }

      to{
        opacity:1;
        transform:scale(1);
      }

    }

  </style>

</head>

  <!-- PAGE 1 -->

    <div class="content">

      <button onclick="nextPage(3)">

  <script>

    function nextPage(current){

      let pages = document.querySelectorAll(".page");

      pages[current - 1].classList.remove("active");

      pages[current].classList.add("active");

      // PLAY MUSIC ON FINAL PAGE

      if(current === 4){

        let music = document.getElementById("bgmusic");

        music.play();

      }

    }

  </script>
